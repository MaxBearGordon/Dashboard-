<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mr. Gordon</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=JetBrains+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
/* ═══ CLAUDE ORANGE + DARK ═══ */
:root {
  --bg:      #1a1a1a;
  --bg2:     #111111;
  --surface: #212121;
  --s2:      #2a2a2a;
  --s3:      #333333;
  --border:  #2a2a2a;
  --b2:      #3a3a3a;
  --blue:    #d97757;
  --purple:  #e8874a;
  --green:   #40916c;
  --red:     #e05252;
  --yellow:  #e8874a;
  --cyan:    #f0a070;
  --orange:  #d97757;
  --text:    #d97757;
  --dim:     #7a5a48;
  --muted:   #3a2a20;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'JetBrains Mono', monospace;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
  font-size: 13px;
}

/* subtle grid bg */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(217,119,87,0.015) 1px, transparent 1px),
    linear-gradient(90deg, rgba(217,119,87,0.015) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

.shell {
  position: relative;
  z-index: 1;
  max-width: 1360px;
  margin: 0 auto;
  padding: 24px 20px;
}

/* ── HEADER ────────────────────────────────── */
.header {
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  margin-bottom: 14px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}

.greet-line {
  font-size: 10px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 4px;
}
.greet-main {
  font-family: 'Syne', sans-serif;
  font-size: clamp(26px, 3.5vw, 38px);
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1;
  color: #c8a882;
}
.greet-main .accent { color: var(--orange); }

.day-status {
  margin-top: 6px;
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
  text-transform: uppercase;
}

.clock-block { text-align: right; }
.clock {
  font-family: 'Syne', sans-serif;
  font-size: clamp(32px, 4vw, 48px);
  font-weight: 700;
  color: #c8a882;
  line-height: 1;
  letter-spacing: -1px;
}
.clock-date {
  font-size: 10px;
  color: var(--dim);
  margin-top: 5px;
  letter-spacing: 1px;
  text-transform: uppercase;
}

/* ── VERSE ────────────────────────────────── */
.verse {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 20px;
  padding: 11px 16px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-left: 2px solid var(--orange);
  border-radius: 3px;
  margin-bottom: 14px;
}
.verse-text {
  font-size: 12px;
  font-style: italic;
  color: #c8a882;
  opacity: 0.85;
  line-height: 1.5;
}
.verse-ref {
  font-size: 10px;
  color: var(--dim);
  white-space: nowrap;
  flex-shrink: 0;
  letter-spacing: 0.5px;
}

/* ── GRID ────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(12, 1fr);
  grid-template-rows: auto auto auto;
  gap: 10px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 5px;
  padding: 16px;
  transition: border-color 0.2s;
}
.card:hover { border-color: var(--b2); }

.label {
  font-size: 9px;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: var(--dim);
  margin-bottom: 13px;
}

.col-3  { grid-column: span 3; }
.col-4  { grid-column: span 4; }
.col-5  { grid-column: span 5; }
.col-12 { grid-column: span 12; }

/* ── SCHEDULE ────────────────────────────── */
.sched-tag {
  display: inline-block;
  background: var(--orange);
  color: var(--bg);
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 1.5px;
  padding: 2px 8px;
  border-radius: 2px;
  margin-bottom: 13px;
  text-transform: uppercase;
}

.block {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 7px 0;
  border-bottom: 1px solid var(--border);
}
.block:last-child { border-bottom: none; }
.block-time {
  font-size: 11px;
  color: var(--dim);
  min-width: 60px;
  flex-shrink: 0;
}
.block-evt {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  color: #c8a882;
}
.dot {
  width: 5px; height: 5px;
  border-radius: 50%; flex-shrink: 0;
}
.dw { background: var(--red); }
.dt { background: var(--green); }
.df { background: var(--yellow); }
.dr { background: var(--purple); }
.dp { background: var(--dim); }

/* ── SCHEDULE ENTRY ──────────────────────── */
.sched-add {
  display: flex; gap: 5px;
  margin-top: 10px;
  padding-top: 10px;
  border-top: 1px solid var(--border);
}
.sched-add input {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: #c8a882;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 5px 8px;
  outline: none;
  transition: border-color 0.15s;
}
.sched-add input:focus { border-color: var(--orange); }
.sched-add input::placeholder { color: var(--dim); }
.sched-time-in { width: 72px; flex-shrink: 0; }
.sched-evt-in  { flex: 1; }
.sched-add-btn {
  background: var(--orange);
  color: var(--bg);
  border: none; border-radius: 3px;
  padding: 0 10px;
  font-family: 'Syne', sans-serif;
  font-size: 16px; font-weight: 700;
  cursor: pointer; transition: opacity 0.15s; flex-shrink: 0;
}
.sched-add-btn:hover { opacity: 0.8; }
.block-del {
  margin-left: auto;
  background: none; border: none;
  color: var(--dim); cursor: pointer;
  font-size: 10px; padding: 0 2px;
  transition: color 0.15s;
}
.block-del:hover { color: var(--red); }

/* ── CHECKLIST ───────────────────────────── */
.ci {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  transition: opacity 0.15s;
}
.ci:last-child { border-bottom: none; }
.ci:hover { opacity: 0.75; }

.cb {
  width: 15px; height: 15px;
  border: 1px solid var(--b2);
  border-radius: 2px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; font-size: 9px;
}
.cb.on { border-color: var(--orange); background: var(--orange); color: var(--bg); }

.ci-label { font-size: 12px; color: #c8a882; }
.ci.done .ci-label { text-decoration: line-through; color: var(--dim); }

/* ── WEATHER ─────────────────────────────── */
.w-temp {
  font-family: 'Syne', sans-serif;
  font-size: 36px;
  font-weight: 700;
  color: var(--orange);
  line-height: 1;
}
.w-desc {
  font-size: 11px;
  color: var(--dim);
  margin-top: 3px;
  text-transform: capitalize;
  margin-bottom: 8px;
}
.w-meta {
  font-size: 10px;
  color: var(--dim);
  line-height: 2;
}

/* ── MEAL TRACKER ────────────────────────── */
.meal-counter {
  font-family: 'Syne', sans-serif;
  font-size: 28px; font-weight: 800;
  color: #c8a882; line-height: 1;
  margin-bottom: 3px;
}
.meal-counter span { color: var(--green); }
.meal-counter .denom { color: var(--dim); font-size: 18px; }
.meal-slots { margin-top: 12px; }
.meal-slot {
  display: flex; align-items: center; gap: 8px;
  padding: 8px 0;
  border-bottom: 1px solid var(--border);
}
.meal-slot:last-child { border-bottom: none; }
.meal-slot-cb {
  width: 15px; height: 15px; flex-shrink: 0;
  border: 1px solid var(--b2); border-radius: 2px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: all 0.15s; font-size: 9px;
}
.meal-slot-cb.on { border-color: var(--orange); background: var(--orange); color: var(--bg); }
.meal-slot-num {
  font-size: 9px; color: var(--orange);
  letter-spacing: 1px; flex-shrink: 0; min-width: 20px;
}
.meal-slot-input {
  flex: 1;
  background: transparent;
  border: none;
  border-bottom: 1px solid transparent;
  color: #c8a882;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  padding: 2px 0;
  outline: none;
  transition: border-color 0.15s;
}
.meal-slot-input:focus { border-bottom-color: var(--orange); }
.meal-slot-input::placeholder { color: var(--dim); }
.meal-slot.done .meal-slot-input { text-decoration: line-through; color: var(--dim); }


/* ── STREAK ──────────────────────────────── */
.streak-n {
  font-family: 'Syne', sans-serif;
  font-size: 56px;
  font-weight: 800;
  color: var(--orange);
  line-height: 1;
}
.streak-sub {
  font-size: 9px;
  color: var(--dim);
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 2px;
  margin-bottom: 12px;
}
.streak-btns {
  display: flex; gap: 6px;
  margin-bottom: 20px;
}
.sbtn {
  flex: 1;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: #c8a882;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  padding: 5px 0;
  cursor: pointer;
  transition: border-color 0.15s;
}
.sbtn:hover { border-color: var(--orange); }

.next-sep {
  border-top: 1px solid var(--border);
  padding-top: 14px;
  margin-top: 4px;
}
.next-day {
  font-family: 'Syne', sans-serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--orange);
  line-height: 1;
}
.next-time {
  font-size: 10px;
  color: var(--dim);
  margin-top: 4px;
  letter-spacing: 0.5px;
}

/* ── NOTES ───────────────────────────────── */
.notes-ta {
  width: 100%;
  min-height: 90px;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 3px;
  color: #c8a882;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.65;
  padding: 11px 14px;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s;
}
.notes-ta:focus { border-color: var(--orange); }
.notes-ta::placeholder { color: var(--dim); }
.notes-foot {
  display: flex; justify-content: space-between; align-items: center;
  margin-top: 6px;
}
.notes-meta { font-size: 9px; color: var(--dim); letter-spacing: 1px; }
.notes-clear {
  background: none; border: none;
  color: var(--dim); font-size: 9px;
  cursor: pointer; letter-spacing: 1px;
  font-family: 'JetBrains Mono', monospace;
  text-transform: uppercase;
  transition: color 0.15s;
}
.notes-clear:hover { color: var(--red); }

/* ── LOADING / NOTICE ───────────────────── */
.loading {
  font-size: 10px;
  color: var(--dim);
  letter-spacing: 1px;
  animation: pulse 1.5s infinite;
}
.notice {
  font-size: 10px;
  color: var(--yellow);
  line-height: 1.7;
  opacity: 0.8;
}
@keyframes pulse { 0%,100%{opacity:0.3} 50%{opacity:0.8} }

/* ── ANIMATIONS ─────────────────────────── */
.fade { animation: up 0.45s ease both; }
.d1 { animation-delay: 0.04s; }
.d2 { animation-delay: 0.08s; }
.d3 { animation-delay: 0.12s; }
.d4 { animation-delay: 0.16s; }
.d5 { animation-delay: 0.20s; }
.d6 { animation-delay: 0.24s; }
.d7 { animation-delay: 0.28s; }
.d8 { animation-delay: 0.32s; }
@keyframes up { from{opacity:0;transform:translateY(10px)} to{opacity:1;transform:none} }

/* ── RESPONSIVE ──────────────────────────── */
@media (max-width: 960px) {
  .col-3,.col-4,.col-5,.side-col { grid-column: span 12; }
}
</style>
</head>
<body>
<div class="shell">

<!-- HEADER -->
<header class="header fade">
  <div>
    <div class="greet-line" id="tod">GOOD MORNING</div>
    <div class="greet-main">MR. <span class="accent">GORDON</span></div>
    <div class="day-status" id="dayStatus"></div>
  </div>
  <div class="clock-block">
    <div class="clock" id="clock">--:--</div>
    <div class="clock-date" id="clockDate">--</div>
  </div>
</header>

<!-- VERSE -->
<div class="verse fade d1">
  <div class="verse-text" id="verseText"></div>
  <div class="verse-ref" id="verseRef"></div>
</div>

<!-- GRID -->
<div class="grid">

  <!-- SCHEDULE -->
  <div class="card col-5 fade d2">
    <div class="label">Today's Schedule</div>
    <div class="sched-tag" id="schedDay"></div>
    <div id="schedBlocks"></div>
    <div class="sched-add">
      <input type="text" class="sched-time-in" id="schedTimeIn" placeholder="10:00 AM">
      <input type="text" class="sched-evt-in"  id="schedEvtIn"  placeholder="Add event...">
      <button class="sched-add-btn" onclick="addSchedBlock()">+</button>
    </div>
  </div>

  <!-- WEATHER -->
  <div class="card col-3 fade d3">
    <div class="label">Plymouth, MN</div>
    <div id="weatherWrap"><div class="loading">FETCHING...</div></div>
  </div>

  <!-- CHECKLIST -->
  <div class="card col-4 fade d4">
    <div class="label">Non-Negotiables</div>
    <div id="checkList"></div>
  </div>



  <!-- MEALS -->
  <div class="card col-6 fade d6">
    <div class="label">Meals Today</div>
    <div class="meal-counter"><span id="mealDone">0</span><span class="denom"> / 4</span></div>
    <div class="meal-slots" id="mealSlots"></div>
  </div>

  <!-- STREAK + NEXT TRAIN -->
  <div class="card col-3 fade d7">
    <div class="label">Lifting Streak</div>
    <div class="streak-n" id="streakN">0</div>
    <div class="streak-sub">Days Complete</div>
    <div class="streak-btns">
      <button class="sbtn" onclick="adj(-1)">−</button>
      <button class="sbtn" onclick="adj(1)">+</button>
    </div>
    <div class="next-sep">
      <div class="label" style="margin-bottom:8px;">Next Session</div>
      <div class="next-day" id="nextDay">—</div>
      <div class="next-time" id="nextTime">—</div>
    </div>
  </div>

  <!-- NOTES -->
  <div class="card col-12 fade d8">
    <div class="label">Notes — Persists Until Cleared</div>
    <textarea class="notes-ta" id="notesTA" placeholder="Thoughts, reminders, follow-ups..."></textarea>
    <div class="notes-foot">
      <div class="notes-meta" id="notesMeta">nothing saved</div>
      <button class="notes-clear" onclick="clearNotes()">Clear</button>
    </div>
  </div>

</div><!-- /grid -->
</div><!-- /shell -->

<script>
// ── CONFIG ────────────────────────────────────────────────
const WEATHER_KEY = 'f842102264de4c44adee09311e5a08d3';
const PLY_LAT     = 44.9719;
const PLY_LON     = -93.4569;

// ── STATE ─────────────────────────────────────────────────
const SK      = 'gd2';
const TODAY   = new Date().toDateString();

function load() {
  try { return JSON.parse(localStorage.getItem(SK)) || {}; }
  catch { return {}; }
}
function save(s) { localStorage.setItem(SK, JSON.stringify(s)); }

let S = load();
if (S.date !== TODAY) {
  S = {
    date:         TODAY,
    checks:       {},
    mealSlots:    [
      { text:'', done:false }, { text:'', done:false },
      { text:'', done:false }, { text:'', done:false },
    ],
    customBlocks: [],
    notes:        S.notes || '',
    streak:       (S.allDone) ? (parseInt(S.streak)||0) + 1 : (parseInt(S.streak)||0),
    allDone:      false,
    wc: S.wc, wt: S.wt,
  };
  save(S);
}

// ── CLOCK ─────────────────────────────────────────────────
const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
const MONTHS = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function tick() {
  const n  = new Date();
  const h  = n.getHours(), m = n.getMinutes();
  const h12 = h % 12 || 12;
  const ap  = h >= 12 ? 'PM' : 'AM';
  document.getElementById('clock').textContent =
    `${h12}:${String(m).padStart(2,'0')} ${ap}`;
  document.getElementById('clockDate').textContent =
    `${DAYS[n.getDay()].toUpperCase()} · ${MONTHS[n.getMonth()]} ${n.getDate()}, ${n.getFullYear()}`;
  document.getElementById('tod').textContent =
    h < 12 ? 'GOOD MORNING' : h < 17 ? 'GOOD AFTERNOON' : 'GOOD EVENING';
}
tick(); setInterval(tick, 1000);

// ── VERSE ─────────────────────────────────────────────────
const VERSES = [
  { t:'I can do all things through Christ who strengthens me.',                                       r:'Philippians 4:13' },
  { t:'Be strong and courageous. Do not be afraid, for the LORD your God will be with you wherever you go.', r:'Joshua 1:9' },
  { t:'Commit your work to the LORD, and your plans will be established.',                            r:'Proverbs 16:3' },
  { t:'No discipline seems pleasant at the time, but painful. Later on, however, it produces a harvest of righteousness.', r:'Hebrews 12:11' },
  { t:'The soul of the diligent is richly supplied.',                                                 r:'Proverbs 13:4' },
  { t:'For God gave us a spirit not of fear but of power and love and self-control.',                 r:'2 Timothy 1:7' },
  { t:'Whatever you do, work heartily, as for the Lord and not for men.',                             r:'Colossians 3:23' },
];
const dow = new Date().getDay();
const vv  = VERSES[dow];
document.getElementById('verseText').textContent = `"${vv.t}"`;
document.getElementById('verseRef').textContent  = `— ${vv.r}`;

// ── SCHEDULE ──────────────────────────────────────────────
const STATUS_MAP = [
  'SUNDAY — DAY OFF',
  'MONDAY — WORK · 10AM–8PM',
  'TUESDAY — WORK · 10AM–8PM',
  'WEDNESDAY — DAY OFF',
  'THURSDAY — WORK · 10AM–8PM',
  'FRIDAY — WORK · 10AM–2PM',
  'SATURDAY — DAY OFF',
];
document.getElementById('dayStatus').textContent = STATUS_MAP[dow];
document.getElementById('schedDay').textContent  = DAYS[dow].toUpperCase();

const SCHEDS = {
  0: [
    { t:'FREE',     e:'Rest Day',            c:'dr' },
  ],
  1: [
    { t:'10:00 AM', e:'Work',   c:'dw' },
    { t:'8:00 PM',  e:'End of shift',        c:'dw' },
  ],
  2: [
    { t:'10:00 AM', e:'Work',   c:'dw' },
    { t:'8:00 PM',  e:'End of shift',        c:'dw' },
  ],
  3: [
    { t:'FREE',     e:'Day Off',             c:'dr' },
  ],
  4: [
    { t:'10:00 AM', e:'Work',   c:'dw' },
    { t:'8:00 PM',  e:'End of shift',        c:'dw' },
  ],
  5: [
    { t:'10:00 AM', e:'Work',   c:'dw' },
    { t:'2:00 PM',  e:'End of shift',        c:'dw' },
  ],
  6: [
    { t:'FREE',     e:'Day Off',             c:'dr' },
  ],
};
const sb = document.getElementById('schedBlocks');
function renderSched() {
  sb.innerHTML = '';
  (SCHEDS[dow]||[]).forEach(s => {
    sb.innerHTML += `<div class="block">
      <span class="block-time">${s.t}</span>
      <div class="dot ${s.c}"></div>
      <span class="block-evt">${s.e}</span>
    </div>`;
  });
  (S.customBlocks||[]).forEach((s,i) => {
    sb.innerHTML += `<div class="block">
      <span class="block-time">${s.t}</span>
      <div class="dot dp"></div>
      <span class="block-evt">${s.e}</span>
      <button class="block-del" onclick="delBlock(${i})">✕</button>
    </div>`;
  });
}
renderSched();

function addSchedBlock() {
  const t = document.getElementById('schedTimeIn').value.trim();
  const e = document.getElementById('schedEvtIn').value.trim();
  if (!e) return;
  S.customBlocks = S.customBlocks||[];
  S.customBlocks.push({ t: t||'—', e });
  save(S); renderSched();
  document.getElementById('schedTimeIn').value = '';
  document.getElementById('schedEvtIn').value  = '';
}
function delBlock(i) { S.customBlocks.splice(i,1); save(S); renderSched(); }
document.getElementById('schedEvtIn').addEventListener('keydown', e => { if(e.key==='Enter') addSchedBlock(); });

// ── CHECKLIST ─────────────────────────────────────────────
const TASKS = ['Workout','4 Meals Hit','Faith / Bible + Prayer','Work Checklist','Relationship Effort'];
const cl = document.getElementById('checkList');
function renderCheck() {
  cl.innerHTML = '';
  let all = true;
  TASKS.forEach((t,i) => {
    const on = !!S.checks[i];
    if (!on) all = false;
    const d = document.createElement('div');
    d.className = `ci${on?' done':''}`;
    d.innerHTML = `<div class="cb${on?' on':''}">${on?'✓':''}</div><span class="ci-label">${t}</span>`;
    d.onclick = () => {
      S.checks[i] = !S.checks[i];
      S.allDone = TASKS.every((_,j) => S.checks[j]);
      save(S); renderCheck();
    };
    cl.appendChild(d);
  });
}
renderCheck();



// ── MEAL TRACKER ──────────────────────────────────────────
S.mealSlots = S.mealSlots || [
  { text:'', done: false },
  { text:'', done: false },
  { text:'', done: false },
  { text:'', done: false },
];
function renderMealSlots() {
  const wrap = document.getElementById('mealSlots');
  wrap.innerHTML = '';
  let doneCount = 0;
  S.mealSlots.forEach((m,i) => {
    if (m.done) doneCount++;
    const row = document.createElement('div');
    row.className = `meal-slot${m.done?' done':''}`;
    row.innerHTML = `
      <div class="meal-slot-cb${m.done?' on':''}" onclick="toggleMeal(${i})">${m.done?'✓':''}</div>
      <span class="meal-slot-num">M${i+1}</span>
      <input class="meal-slot-input" type="text" placeholder="What did you eat?" value="${m.text.replace(/"/g,'&quot;')}"
        oninput="saveMealText(${i}, this.value)">`;
    wrap.appendChild(row);
  });
  document.getElementById('mealDone').textContent = doneCount;
}
function toggleMeal(i) {
  S.mealSlots[i].done = !S.mealSlots[i].done;
  save(S); renderMealSlots();
}
function saveMealText(i, v) {
  S.mealSlots[i].text = v;
  save(S);
}
renderMealSlots();

// ── STREAK ────────────────────────────────────────────────
function renderStreak() { document.getElementById('streakN').textContent = S.streak||0; }
function adj(d) { S.streak = Math.max(0,(parseInt(S.streak)||0)+d); save(S); renderStreak(); }
renderStreak();

// ── NEXT TRAINING ─────────────────────────────────────────

// ── NOTES ─────────────────────────────────────────────────
const ta = document.getElementById('notesTA');
ta.value = S.notes||'';
function syncNotesMeta() {
  const l = ta.value.length;
  document.getElementById('notesMeta').textContent =
    l > 0 ? `${l} chars · auto-saved` : 'nothing saved';
}
syncNotesMeta();
ta.addEventListener('input', () => { S.notes = ta.value; save(S); syncNotesMeta(); });
function clearNotes() {
  if (!ta.value) return;
  if (confirm('Clear all notes?')) { ta.value=''; S.notes=''; save(S); syncNotesMeta(); }
}



// ── WEATHER ───────────────────────────────────────────────
async function fetchWeather() {
  const el  = document.getElementById('weatherWrap');
  const now = Date.now();
  const TTL = 3600000;
  if (WEATHER_KEY === 'YOUR_OPENWEATHER_API_KEY') {
    el.innerHTML = `<div class="notice">Paste your OpenWeather API key<br>at the top of the script.</div>`;
    return;
  }
  if (S.wc && S.wt && (now - S.wt) < TTL) { renderWeather(S.wc); return; }
  try {
    const r = await fetch(`https://api.openweathermap.org/data/2.5/weather?lat=${PLY_LAT}&lon=${PLY_LON}&appid=${WEATHER_KEY}&units=imperial`);
    const d = await r.json();
    S.wc = d; S.wt = now; save(S);
    renderWeather(d);
  } catch { el.innerHTML = '<div class="notice">WEATHER UNAVAILABLE</div>'; }
}
function renderWeather(d) {
  const el    = document.getElementById('weatherWrap');
  const temp  = Math.round(d.main?.temp||0);
  const feels = Math.round(d.main?.feels_like||0);
  const desc  = d.weather?.[0]?.description||'—';
  const humid = d.main?.humidity||0;
  const wind  = Math.round(d.wind?.speed||0);
  el.innerHTML = `
    <div class="w-temp">${temp}°F</div>
    <div class="w-desc">${desc}</div>
    <div class="w-meta">
      Feels ${feels}°F<br>
      Humidity ${humid}% · Wind ${wind}mph
    </div>`;
}
fetchWeather();
</script>
